<div class="login-container">
  <div class="login-card">
    <h1>Bem-vindo</h1>
    <p>Faça login para continuar</p>

    <form (ngSubmit)="onLogin()">
      <input
        type="email"
        placeholder="Email"
        [(ngModel)]="email"
        name="email"
        required
      />

      <input
        type="password"
        placeholder="Senha"
        [(ngModel)]="password"
        name="password"
        required
      />

      <button type="submit">Entrar</button>
    </form>
  </div>
</div>
