<div class="dashboard">

  <div class="header">
    <div>
      <h1>Dashboard</h1>
      <p>Visão geral da semana</p>
    </div>

    <div class="filter">
      <label>Semana</label>
      <input type="number" [(ngModel)]="selectedWeek" min="1" max="52">
    </div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <h3>Total</h3>
      <p>{{ total }}</p>
    </div>

    <div class="stat-card">
      <h3>Semana atual</h3>
      <p>{{ selectedWeek }}</p>
    </div>
  </div>

  <div class="chart">
    <div class="bar" *ngFor="let item of filteredData">
      <span>Semana {{ item.week }}</span>
      <div class="bar-fill" [style.width.%]="item.value * 2"></div>
    </div>
  </div>

</div>
